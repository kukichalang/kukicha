name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Build
        run: make build

      - name: Touch generated .go files
        run: |
          # After git checkout all files share the same timestamp, which can
          # cause the .kuki-newer-than-.go staleness check to fail even though
          # the content is up to date.  Touch the generated .go files so the
          # timestamp check passes.
          find stdlib -name '*.go' -exec touch {} +

      - name: Test
        run: make test

      - name: Lint
        run: make lint

      - name: Vet
        run: make vet

      - name: Formatter check
        run: make fmt-check
